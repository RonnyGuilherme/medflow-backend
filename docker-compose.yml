version: "3.9"

networks:
  medflow-internal:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: medflow-postgres
    networks: [medflow-internal]
    environment:
      POSTGRES_DB: medflow
      POSTGRES_USER: medflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed-dev-data.sql:/docker-entrypoint-initdb.d/00_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medflow -d medflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: medflow-zookeeper
    networks: [medflow-internal]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: medflow-kafka
    networks: [medflow-internal]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 720
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: medflow-mailhog
    networks: [medflow-internal]
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ─── API Gateway ─────────────────────────────────────────────────────────────

  kong:
    image: kong:3.7
    container_name: medflow-kong
    networks: [medflow-internal]
    depends_on:
      orchestrator:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PLUGINS: bundled
    ports:
      - "8000:8000"  # Proxy (client-facing)
      - "8001:8001"  # Admin API
    volumes:
      - ./kong:/kong

  # ─── Microservices ───────────────────────────────────────────────────────────

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: medflow-orchestrator
    networks: [medflow-internal]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/medflow
      SPRING_DATASOURCE_USERNAME: medflow
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AVAILABILITY_ENGINE_URL: http://availability-engine:8081
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-minimum-256-bits-long-for-hs256}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  availability-engine:
    build:
      context: ./availability-engine
      dockerfile: Dockerfile
    container_name: medflow-availability
    networks: [medflow-internal]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://medflow:${POSTGRES_PASSWORD:-secret}@postgres:5432/medflow?sslmode=disable
      KAFKA_BROKERS: kafka:29092
      PORT: "8081"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notification-dispatcher:
    build:
      context: ./notification-dispatcher
      dockerfile: Dockerfile
    container_name: medflow-notifications
    networks: [medflow-internal]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-dev-placeholder}
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_FROM: noreply@medflow.io
      PORT: "3001"

  # ─── Observability ───────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: medflow-prometheus
    networks: [medflow-internal]
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.3
    container_name: medflow-grafana
    networks: [medflow-internal]
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
