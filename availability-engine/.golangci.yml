run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - prealloc
    - bodyclose
    - contextcheck

linters-settings:
  goimports:
    local-prefixes: github.com/RonnyGuilherme/medflow-backend
