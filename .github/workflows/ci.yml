name: MedFlow CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  GO_VERSION:   '1.22'
  NODE_VERSION: '20'

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Orchestrator (Java 21 / Spring Boot 3)
  # ──────────────────────────────────────────────────────────────────────────
  orchestrator:
    name: Orchestrator — Build & Test
    runs-on: ubuntu-latest

    services:
      # Testcontainers manages its own containers — this just ensures Docker is available
      docker:
        image: docker:dind
        options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('orchestrator/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run unit tests
        working-directory: orchestrator
        run: mvn test -B -Dsurefire.failIfNoSpecifiedTests=false

      - name: Run integration tests (Testcontainers — requires Docker)
        working-directory: orchestrator
        run: mvn verify -B -P integration-tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: SonarCloud Analysis
        working-directory: orchestrator
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=RonnyGuilhermes_medflow-backend \
            -Dsonar.organization=ronnyguilhermes \
            -Dsonar.host.url=https://sonarcloud.io

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-test-results
          path: orchestrator/target/surefire-reports/

      - name: Build Docker image
        working-directory: orchestrator
        run: docker build -t medflow/orchestrator:${{ github.sha }} .

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Availability Engine (Go 1.22)
  # ──────────────────────────────────────────────────────────────────────────
  availability-engine:
    name: Availability Engine — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: availability-engine/go.sum

      - name: Download dependencies
        working-directory: availability-engine
        run: go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: availability-engine
          version: latest

      - name: Run tests (with race detector)
        working-directory: availability-engine
        run: go test ./... -race -count=1 -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: availability-engine-coverage
          path: availability-engine/coverage.txt

      - name: Build binary
        working-directory: availability-engine
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/availability-engine ./cmd/server

      - name: Build Docker image
        working-directory: availability-engine
        run: docker build -t medflow/availability-engine:${{ github.sha }} .

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Notification Dispatcher (Node.js 20 / TypeScript)
  # ──────────────────────────────────────────────────────────────────────────
  notification-dispatcher:
    name: Notification Dispatcher — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: notification-dispatcher/package-lock.json

      - name: Install dependencies
        working-directory: notification-dispatcher
        run: npm ci --silent

      - name: Type check
        working-directory: notification-dispatcher
        run: npm run typecheck

      - name: ESLint
        working-directory: notification-dispatcher
        run: npm run lint

      - name: Run tests with coverage
        working-directory: notification-dispatcher
        run: npm run test:cov

      - name: Build TypeScript
        working-directory: notification-dispatcher
        run: npm run build

      - name: Build Docker image
        working-directory: notification-dispatcher
        run: docker build -t medflow/notification-dispatcher:${{ github.sha }} .

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Validate Docker Compose (smoke test)
  # ──────────────────────────────────────────────────────────────────────────
  compose-validate:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    needs: [orchestrator, availability-engine, notification-dispatcher]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose config --quiet

      - name: Check Kong config
        run: |
          docker run --rm -v $(pwd)/kong:/kong kong:3.7 \
            kong config parse /kong/kong.yml

  # ──────────────────────────────────────────────────────────────────────────
  # Job 5: Security scan
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [orchestrator, availability-engine, notification-dispatcher]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (Java)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: orchestrator/pom.xml
          format: table
          exit-code: 0  # Don't fail CI on vulnerabilities — report only

      - name: Run npm audit
        working-directory: notification-dispatcher
        run: npm audit --audit-level=high || true
