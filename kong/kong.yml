_format_version: "3.0"
_transform: true

# ── Consumers (JWT credential owners) ────────────────────────────────────────
consumers:
  - username: patient-app
    jwt_secrets:
      - key: patient-app-key
        secret: dev-secret-key-minimum-256-bits-long-for-hs256-algorithm  # REPLACE in prod: see docs/deployment.md
        algorithm: HS256

  - username: professional-app
    jwt_secrets:
      - key: professional-app-key
        secret: dev-secret-key-minimum-256-bits-long-for-hs256-algorithm  # REPLACE in prod: see docs/deployment.md
        algorithm: HS256

  - username: reception-web
    jwt_secrets:
      - key: reception-web-key
        secret: dev-secret-key-minimum-256-bits-long-for-hs256-algorithm  # REPLACE in prod: see docs/deployment.md
        algorithm: HS256

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # Orchestrator — appointment lifecycle
  - name: orchestrator-service
    url: http://orchestrator:8080
    connect_timeout: 5000
    read_timeout: 30000
    write_timeout: 30000
    routes:
      - name: appointments-route
        paths: ["/api/v1/appointments"]
        methods: [GET, POST, PATCH]
        strip_path: false
      - name: notifications-route
        paths: ["/api/v1/notifications"]
        methods: [GET]
        strip_path: false

  # Availability Engine — slot queries
  - name: availability-service
    url: http://availability-engine:8081
    connect_timeout: 3000
    read_timeout: 10000
    routes:
      - name: availability-route
        paths: ["/api/v1/availability"]
        methods: [GET]
        strip_path: true

  # Health check — public, no auth
  - name: health-service
    url: http://orchestrator:8080
    routes:
      - name: health-route
        paths: ["/health"]
        methods: [GET]
        strip_path: false

# ── Plugins (applied to all routes except health) ────────────────────────────
plugins:

  # JWT validation — verifies signature + expiry, sets consumer context
  - name: jwt
    service: orchestrator-service
    config:
      claims_to_verify: [exp]
      key_claim_name: iss
      maximum_expiration: 86400  # 24 hours max

  - name: jwt
    service: availability-service
    config:
      claims_to_verify: [exp]
      key_claim_name: iss
      maximum_expiration: 86400

  # Rate limiting — per consumer (clinic) to prevent abuse
  - name: rate-limiting
    service: orchestrator-service
    config:
      minute: 200
      hour: 5000
      policy: local

  - name: rate-limiting
    service: availability-service
    config:
      minute: 500
      policy: local

  # Request transformer — injects tenant and correlation headers from JWT
  # Kong extracts consumer.username and custom JWT claims for downstream services.
  # X-Tenant-ID is injected via a pre-function plugin reading the JWT payload.
  - name: pre-function
    service: orchestrator-service
    config:
      access:
        - |
          local jwt_decoder = require "kong.plugins.jwt.jwt_parser"
          local auth_header = kong.request.get_header("Authorization")
          if auth_header then
            local token = auth_header:match("Bearer (.+)")
            if token then
              local jwt = jwt_decoder:new(token)
              if jwt and jwt.claims then
                if jwt.claims.tenant_id then
                  kong.service.request.set_header("X-Tenant-ID", jwt.claims.tenant_id)
                end
                if jwt.claims.sub then
                  kong.service.request.set_header("X-User-ID", jwt.claims.sub)
                end
                if jwt.claims.role then
                  kong.service.request.set_header("X-User-Role", jwt.claims.role)
                end
              end
            end
          end
          -- Generate correlation ID if not present
          local correlation_id = kong.request.get_header("X-Correlation-ID")
          if not correlation_id then
            local uuid = require "resty.jit-uuid"
            uuid.seed()
            kong.service.request.set_header("X-Correlation-ID", uuid.generate_v4())
          end

  # Correlation ID header passthrough for availability service
  - name: pre-function
    service: availability-service
    config:
      access:
        - |
          local jwt_decoder = require "kong.plugins.jwt.jwt_parser"
          local auth_header = kong.request.get_header("Authorization")
          if auth_header then
            local token = auth_header:match("Bearer (.+)")
            if token then
              local jwt = jwt_decoder:new(token)
              if jwt and jwt.claims and jwt.claims.tenant_id then
                kong.service.request.set_header("X-Tenant-ID", jwt.claims.tenant_id)
              end
            end
          end

  # Response headers — security hardening
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "Strict-Transport-Security:max-age=31536000; includeSubDomains"
